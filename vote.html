<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线投票</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f4f8 0%, #f5f7fa 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 30px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 24px;
        }

        h2 {
            color: #34495e;
            margin-bottom: 20px;
            font-size: 18px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #3498db;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-item {
            display: flex;
            gap: 10px;
        }

        .option-input {
            flex: 1;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.4);
        }

        .btn-secondary {
            background: #ecf0f1;
            color: #34495e;
        }

        .btn-secondary:hover {
            background: #bdc3c7;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
            padding: 12px 16px;
        }

        .btn-danger:hover:not(:disabled) {
            background: #c0392b;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-group .btn {
            flex: 1;
        }

        .vote-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .vote-option {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .vote-option:hover:not(.voted) {
            border-color: #3498db;
            background: #f0f8ff;
        }

        .vote-option.selected {
            border-color: #27ae60;
            background: #f0fff4;
        }

        .vote-option.voted {
            cursor: default;
            opacity: 0.8;
        }

        .option-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .option-name {
            font-weight: 600;
            color: #2c3e50;
        }

        .option-votes {
            color: #7f8c8d;
            font-size: 14px;
        }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3498db 0%, #2980b9 100%);
            border-radius: 6px;
            transition: width 0.5s ease-out;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .status-message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
        }

        .status-warning {
            background: #fff3cd;
            color: #856404;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        .hidden {
            display: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #3498db;
        }

        .server-info {
            text-align: center;
            font-size: 12px;
            color: #95a5a6;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗳️ 在线投票</h1>

        <div id="create-section">
            <h2>创建新投票</h2>
            
            <div class="input-group">
                <label for="vote-title">投票标题</label>
                <input type="text" id="vote-title" placeholder="请输入投票标题">
            </div>

            <div class="input-group">
                <label>投票选项</label>
                <div class="options-list" id="options-list">
                    <div class="option-item">
                        <input type="text" class="option-input" placeholder="选项 1">
                        <button class="btn btn-danger remove-option" disabled>×</button>
                    </div>
                    <div class="option-item">
                        <input type="text" class="option-input" placeholder="选项 2">
                        <button class="btn btn-danger remove-option">×</button>
                    </div>
                </div>
                <button class="btn btn-secondary" id="add-option">+ 添加选项</button>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="start-vote">开始投票</button>
            </div>
        </div>

        <div id="vote-section" class="hidden">
            <div class="status-message" id="vote-status"></div>
            
            <h2 id="vote-title-display"></h2>
            
            <div id="vote-options-container">
                <div class="vote-options" id="vote-options"></div>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" id="refresh-vote">刷新结果</button>
                <button class="btn btn-danger" id="reset-vote">重置投票</button>
            </div>
        </div>

        <div class="server-info">
            本地存储模式 · 数据保存在浏览器中
        </div>
    </div>

    <script>
        const STORAGE_KEY_VOTE = 'vote_data';
        const STORAGE_KEY_HAS_VOTED = 'vote_has_voted';
        const STORAGE_KEY_VOTED_OPTION = 'vote_voted_option';

        const createSection = document.getElementById('create-section');
        const voteSection = document.getElementById('vote-section');
        const voteTitleInput = document.getElementById('vote-title');
        const optionsList = document.getElementById('options-list');
        const addOptionBtn = document.getElementById('add-option');
        const startVoteBtn = document.getElementById('start-vote');
        const voteTitleDisplay = document.getElementById('vote-title-display');
        const voteOptions = document.getElementById('vote-options');
        const voteStatus = document.getElementById('vote-status');
        const resetVoteBtn = document.getElementById('reset-vote');
        const refreshVoteBtn = document.getElementById('refresh-vote');

        let currentVote = null;
        let hasVoted = false;
        let votedOptionId = null;

        function init() {
            const savedVote = localStorage.getItem(STORAGE_KEY_VOTE);
            if (savedVote) {
                currentVote = JSON.parse(savedVote);
                hasVoted = localStorage.getItem(STORAGE_KEY_HAS_VOTED) === 'true';
                votedOptionId = localStorage.getItem(STORAGE_KEY_VOTED_OPTION) ? parseInt(localStorage.getItem(STORAGE_KEY_VOTED_OPTION)) : null;
                showVoteSection();
                renderVote();
            } else {
                showCreateSection();
            }
        }

        function showCreateSection() {
            createSection.classList.remove('hidden');
            voteSection.classList.add('hidden');
        }

        function showVoteSection() {
            createSection.classList.add('hidden');
            voteSection.classList.remove('hidden');
        }

        addOptionBtn.addEventListener('click', () => {
            const optionCount = optionsList.querySelectorAll('.option-item').length;
            const newItem = document.createElement('div');
            newItem.className = 'option-item';
            newItem.innerHTML = `
                <input type="text" class="option-input" placeholder="选项 ${optionCount + 1}">
                <button class="btn btn-danger remove-option">×</button>
            `;
            optionsList.appendChild(newItem);
            updateRemoveButtons();
            newItem.querySelector('.remove-option').addEventListener('click', removeOption);
        });

        function removeOption(e) {
            e.target.parentElement.remove();
            updateRemoveButtons();
        }

        function updateRemoveButtons() {
            const items = optionsList.querySelectorAll('.option-item');
            const removeButtons = optionsList.querySelectorAll('.remove-option');
            removeButtons.forEach((btn) => {
                btn.disabled = items.length <= 2;
            });
        }

        startVoteBtn.addEventListener('click', () => {
            const title = voteTitleInput.value.trim();
            const optionInputs = optionsList.querySelectorAll('.option-input');
            const options = [];

            optionInputs.forEach(input => {
                const value = input.value.trim();
                if (value) {
                    options.push(value);
                }
            });

            if (!title) {
                alert('请输入投票标题');
                return;
            }

            if (options.length < 2) {
                alert('至少需要2个有效选项');
                return;
            }

            currentVote = {
                id: Date.now(),
                title: title,
                options: options.map((name, index) => ({
                    id: index + 1,
                    name: name,
                    count: 0
                }))
            };

            localStorage.setItem(STORAGE_KEY_VOTE, JSON.stringify(currentVote));
            localStorage.setItem(STORAGE_KEY_HAS_VOTED, 'false');
            localStorage.removeItem(STORAGE_KEY_VOTED_OPTION);
            
            hasVoted = false;
            votedOptionId = null;
            
            showVoteSection();
            renderVote();
        });

        function renderVote() {
            if (!currentVote) return;

            voteTitleDisplay.textContent = currentVote.title;
            
            if (hasVoted) {
                voteStatus.textContent = '您已完成投票';
                voteStatus.className = 'status-message status-success';
            } else {
                voteStatus.textContent = '点击选项进行投票';
                voteStatus.className = 'status-message status-warning';
            }

            const totalVotes = currentVote.options.reduce((sum, opt) => sum + opt.count, 0);

            voteOptions.innerHTML = currentVote.options.map(option => {
                const percentage = totalVotes > 0 ? ((option.count / totalVotes) * 100).toFixed(1) : 0;
                const isSelected = votedOptionId === option.id;
                const canVote = !hasVoted;

                return `
                    <div class="vote-option ${isSelected ? 'selected voted' : ''}" data-option-id="${option.id}">
                        <div class="option-header">
                            <span class="option-name">${option.name}</span>
                            <span class="option-votes">${option.count} 票 (${percentage}%)</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                `;
            }).join('');

            if (canVote) {
                voteOptions.querySelectorAll('.vote-option').forEach(option => {
                    option.addEventListener('click', handleVote);
                });
            }
        }

        function handleVote(e) {
            if (hasVoted) return;

            const optionId = parseInt(e.currentTarget.dataset.optionId);
            const option = currentVote.options.find(opt => opt.id === optionId);
            
            if (option) {
                option.count++;
                hasVoted = true;
                votedOptionId = optionId;

                localStorage.setItem(STORAGE_KEY_VOTE, JSON.stringify(currentVote));
                localStorage.setItem(STORAGE_KEY_HAS_VOTED, 'true');
                localStorage.setItem(STORAGE_KEY_VOTED_OPTION, optionId.toString());

                renderVote();
            }
        }

        refreshVoteBtn.addEventListener('click', () => {
            const savedVote = localStorage.getItem(STORAGE_KEY_VOTE);
            if (savedVote) {
                currentVote = JSON.parse(savedVote);
            }
            renderVote();
        });

        resetVoteBtn.addEventListener('click', () => {
            if (confirm('确定要重置投票吗？所有投票数据将被清除。')) {
                localStorage.removeItem(STORAGE_KEY_VOTE);
                localStorage.removeItem(STORAGE_KEY_HAS_VOTED);
                localStorage.removeItem(STORAGE_KEY_VOTED_OPTION);
                
                currentVote = null;
                hasVoted = false;
                votedOptionId = null;
                
                voteTitleInput.value = '';
                optionsList.innerHTML = `
                    <div class="option-item">
                        <input type="text" class="option-input" placeholder="选项 1">
                        <button class="btn btn-danger remove-option" disabled>×</button>
                    </div>
                    <div class="option-item">
                        <input type="text" class="option-input" placeholder="选项 2">
                        <button class="btn btn-danger remove-option">×</button>
                    </div>
                `;
                
                optionsList.querySelectorAll('.remove-option').forEach(btn => {
                    btn.addEventListener('click', removeOption);
                });
                
                showCreateSection();
            }
        });

        init();
    </script>
</body>
</html>
